name: Build HD2 LOG VIEWER & Release

on:
  push:
    branches: ["master"]
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install Dependencies
        run: |
          pip install pandas matplotlib numpy pyinstaller
      
      - name: Build Executable
        run: |
          pyinstaller --onefile --noconsole --name "HD2_LOG_VIEWER" HD2_LOG_VIEWER.pyw
      
      - name: Create Release ZIP & Update README
        id: release
        shell: pwsh
        env:
          GITHUB_TAG: ${{ github.ref_name }} # e.g., v1.3.3
        run: |
          # Extract version without 'v' prefix
          $tag = $env:GITHUB_TAG.TrimStart('v')
          
          # Use actual tag for release links if available, else use date
          $releaseName = "release_${tag}.zip"
          Compress-Archive -Path "dist/HD2_LOG_VIEWER.exe", "groups.json" -DestinationPath $releaseName -Force
          
          # Update README only on push/tag events (not workflow_dispatch)
          if ($env:GITHUB_TAG -ne '') {
            Write-Host "Updating README for tag: $env:GITHUB_TAG"
            $startTag = "<!-- LATEST_RELEASE_START -->"
            $endTag = "<!-- LATEST_RELEASE_END -->" 
            
            $date = Get-Date -Format 'yyyy-MM-dd'
            $releaseUrl = "../../releases/tag/${{ github.ref_name }}"
            
            $newBlock = "$startTag`n### 🚀 Latest Release: v${{ github.ref_name }} ($date)`n"
            $newBlock += "- **Download:** [$releaseName]($releaseUrl)`n"
            $newBlock += "- **Security:** Scan complete in parallel job...`n`n$endTag"
            
            $content = Get-Content README.md -Raw
            $content = $content -replace "(?s)$startTag.*?$endTag", $newBlock
            Set-Content README.md $content
            
            # Commit changes
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md
            if (git status --porcelain) {
              git commit -m "docs: update release info for ${{ github.ref_name }} [skip ci]"
            }
          } else {
            Write-Host "No tag found on branch, skipping README update."
          }

      - name: Upload Release Assets
        if: startsWith(github.ref, 'refs/tags/') && steps.release.outputs.TAG != ''
        uses: softprops/action-gh-release@v2
        with:
          files: release_${{ github.ref_name }}.zip
          body: "HD2 LOG VIEWER release artifact."
          draft: false
      
      - name: Upload Artifact for VT Scan
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-output-for-vt
          path: |
            dist/HD2_LOG_VIEWER.exe
            groups.json

  virustotal:
    runs-on: windows-latest
    needs: [build]
    
    if: startsWith(github.ref, 'refs/tags/') && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: read
    
    steps:
      - name: Download Build Output from Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output-for-vt
          path: dist/

      - name: VirusTotal Upload (with retries)
        shell: pwsh
        run: |
          $file = "dist/HD2_LOG_VIEWER.exe"
          $apiKey = "${{ secrets.VT_API_KEY }}"
          $maxRetries = 3
          $attempt = 0
          $success = $false

          while ($attempt -lt $maxRetries -and -not $success) {
            $attempt++
            Write-Host "VT attempt $attempt/$maxRetries..."
            
            try {
              $response = Invoke-RestMethod -Uri "https://www.virustotal.com/api/v3/files" `
                -Headers @{ "x-apikey" = $apiKey } `
                -Method Post `
                -InFile $file
                
              if ($response.data.id) {
                Set-Content vt_result.txt $response.data.id
                Write-Host "VT Scan Success: $($response.data.id)"
                $success = $true
              }
            }
            catch {
              Write-Warning "VT failed attempt $attempt: $_"
            }

            if ($attempt -lt $maxRetries) {
              Start-Sleep -Seconds (5 * $attempt)
            }
          }

          if (-not $success) {
            Set-Content vt_result.txt "SKIPPED_SCAN_FAILED"
          }

      - name: Upload VT Result as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: virus-total-result
          path: vt_result.txt
