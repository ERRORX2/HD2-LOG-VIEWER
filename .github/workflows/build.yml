name: Build HD2 LOG VIEWER

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout Code
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas matplotlib seaborn pyinstaller

    - name: Build EXE
      run: |
        python -m PyInstaller --noconsole --onefile HD2_LOG_VIEWER.pyw

    - name: Prepare Release Package
      shell: pwsh
      run: |
        mkdir release_pkg
        copy-item "dist/HD2_LOG_VIEWER.exe" -Destination "release_pkg/"
        copy-item "groups.json" -Destination "release_pkg/"
        Compress-Archive -Path release_pkg/* -DestinationPath "HD2_LOG_VIEWER_${{ github.ref_name }}.zip"

    - name: Release
      id: create_release
      uses: softprops/action-gh-release@v2
      with:
        files: HD2_LOG_VIEWER_${{ github.ref_name }}.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: VirusTotal Scan
      uses: crazy-max/ghaction-virustotal@v5
      with:
        vt_api_key: ${{ secrets.VT_API_KEY }}
        files: HD2_LOG_VIEWER_${{ github.ref_name }}.zip
        update_release_body: true
        request_rate: 4 
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
