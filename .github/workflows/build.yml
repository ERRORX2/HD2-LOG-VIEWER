name: Build HD2 LOG VIEWER & Release

on:
  push:
    branches: ["master"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHONHASHSEED: "1"
  SOURCE_DATE_EPOCH: "1"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            artifact_binary: HD2_LOG_VIEWER_windows.exe
            zip_suffix: windows

          - os: ubuntu-22.04
            artifact_binary: HD2_LOG_VIEWER_linux
            zip_suffix: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m pip install --upgrade pip

          if (Test-Path "requirements.txt") {
            pip install -r requirements.txt
          } else {
            pip install pandas matplotlib numpy pyinstaller
          }

      - name: Install Dependencies (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install pandas matplotlib numpy pyinstaller
          fi

      - name: Prepare Artifact Folder (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifact | Out-Null
          New-Item -ItemType Directory -Force artifact\sha256 | Out-Null

      - name: Prepare Artifact Folder (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p artifact
          mkdir -p artifact/sha256

      - name: Build Windows Executable
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pyinstaller --clean --noconfirm `
            --onefile `
            --noconsole `
            --noupx `
            --name "HD2_LOG_VIEWER" `
            --add-data "groups.json;." `
            HD2_LOG_VIEWER.pyw

          if (-not (Test-Path "dist\HD2_LOG_VIEWER.exe")) {
            throw "Windows build failed"
          }

          Copy-Item "dist\HD2_LOG_VIEWER.exe" "artifact\${{ matrix.artifact_binary }}" -Force
          Copy-Item "groups.json" "artifact\" -Force

      - name: Build Linux Executable
        if: runner.os == 'Linux'
        shell: bash
        run: |
          pyinstaller \
            --clean \
            --noconfirm \
            --onefile \
            --name "HD2_LOG_VIEWER" \
            --add-data "groups.json:." \
            HD2_LOG_VIEWER.pyw

          if [ ! -f "dist/HD2_LOG_VIEWER" ]; then
            echo "Linux build failed"
            exit 1
          fi

          cp "dist/HD2_LOG_VIEWER" "artifact/${{ matrix.artifact_binary }}"
          cp "groups.json" "artifact/groups.json"

          chmod +x "artifact/${{ matrix.artifact_binary }}"

      - name: Create Linux README
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cat > artifact/README_LINUX.txt << 'EOF'
          HD2 LOG VIEWER - Linux

          How to Run
          ==========

          1. Extract the ZIP

          2. Open a terminal in the extracted folder

          3. Make the binary executable:

             chmod +x HD2_LOG_VIEWER_linux

          4. Run the application:

             ./HD2_LOG_VIEWER_linux

          Notes
          =====

          - This build is intended for x86_64 Linux systems.
          - Built on Ubuntu 22.04 for broader compatibility.
          - May also work on Fedora, Arch, Nobara, SteamOS, and similar modern distros.
          - If the application fails to start, ensure required GUI/system libraries are installed.

          Included Files
          ==============

          - HD2_LOG_VIEWER_linux
          - groups.json
          - manifest.json
          - build_info.json
          - sha256/

          EOF

      - name: Generate Build Info (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $buildInfo = @{
            version = "${{ github.ref_name }}"
            date = Get-Date -Format "yyyy-MM-dd"
            commit = "${{ github.sha }}"
            builder = "github-actions"
            tool = "pyinstaller"
            platform = "${{ runner.os }}"
          } | ConvertTo-Json -Depth 10

          $buildInfo | Set-Content "artifact\build_info.json" -Encoding utf8

      - name: Generate Build Info (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cat > artifact/build_info.json << EOF
          {
            "version": "${{ github.ref_name }}",
            "date": "$(date +%Y-%m-%d)",
            "commit": "${{ github.sha }}",
            "builder": "github-actions",
            "tool": "pyinstaller",
            "platform": "${{ runner.os }}"
          }
          EOF

      - name: Generate SHA256 Hashes (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $binHash  = (Get-FileHash "artifact\${{ matrix.artifact_binary }}" -Algorithm SHA256).Hash
          $jsonHash = (Get-FileHash "artifact\groups.json" -Algorithm SHA256).Hash
          $infoHash = (Get-FileHash "artifact\build_info.json" -Algorithm SHA256).Hash

          $binHash  | Set-Content "artifact\sha256\binary.sha256"
          $jsonHash | Set-Content "artifact\sha256\groups.sha256"
          $infoHash | Set-Content "artifact\sha256\build_info.sha256"

      - name: Generate SHA256 Hashes (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sha256sum "artifact/${{ matrix.artifact_binary }}" | awk '{print $1}' > artifact/sha256/binary.sha256
          sha256sum "artifact/groups.json" | awk '{print $1}' > artifact/sha256/groups.sha256
          sha256sum "artifact/build_info.json" | awk '{print $1}' > artifact/sha256/build_info.sha256

      - name: Create Manifest (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $binHash  = Get-Content "artifact\sha256\binary.sha256"
          $jsonHash = Get-Content "artifact\sha256\groups.sha256"
          $infoHash = Get-Content "artifact\sha256\build_info.sha256"

          $manifest = @{
            version = "${{ github.ref_name }}"
            platform = "${{ runner.os }}"
            files = @{
              "${{ matrix.artifact_binary }}" = $binHash
              "groups.json" = $jsonHash
              "build_info.json" = $infoHash
            }
          } | ConvertTo-Json -Depth 10

          $manifest | Set-Content "artifact\manifest.json" -Encoding utf8

          $manifestHash = (Get-FileHash "artifact\manifest.json" -Algorithm SHA256).Hash
          $manifestHash | Set-Content "artifact\sha256\manifest.sha256"

      - name: Create Manifest (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          BIN_HASH=$(cat artifact/sha256/binary.sha256)
          JSON_HASH=$(cat artifact/sha256/groups.sha256)
          INFO_HASH=$(cat artifact/sha256/build_info.sha256)

          cat > artifact/manifest.json << EOF
          {
            "version": "${{ github.ref_name }}",
            "platform": "${{ runner.os }}",
            "files": {
              "${{ matrix.artifact_binary }}": "$BIN_HASH",
              "groups.json": "$JSON_HASH",
              "build_info.json": "$INFO_HASH"
            }
          }
          EOF

          sha256sum artifact/manifest.json | awk '{print $1}' > artifact/sha256/manifest.sha256

      - name: Create Release ZIP (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $zip = "release_${tag}_${{ matrix.zip_suffix }}.zip"

          Compress-Archive `
            -Path "artifact\*" `
            -DestinationPath "artifact\$zip" `
            -Force

          $zipHash = (Get-FileHash "artifact\$zip" -Algorithm SHA256).Hash
          $zipHash | Set-Content "artifact\sha256\zip.sha256"

      - name: Create Release ZIP (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          ZIP="release_${TAG}_${{ matrix.zip_suffix }}.zip"

          cd artifact
          zip -r "$ZIP" ./*
          cd ..

          sha256sum "artifact/$ZIP" | awk '{print $1}' > artifact/sha256/zip.sha256

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact-${{ matrix.zip_suffix }}
          path: artifact/
          retention-days: 30

      - name: Upload Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifact/release_*.zip
          prerelease: ${{ contains(github.ref_name, '-dev') }}
          generate_release_notes: true