name: Build HD2 LOG VIEWER

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write 

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas matplotlib seaborn pyinstaller

    - name: Build EXE
      run: |
        python -m PyInstaller --noconsole --onefile HD2_LOG_VIEWER.pyw

    - name: Prepare Release Package
      shell: powershell
      run: |
        New-Item -ItemType Directory -Force -Path release_pkg
        Copy-Item "dist/HD2_LOG_VIEWER.exe" -Destination "release_pkg/"
        Copy-Item "groups.json" -Destination "release_pkg/"
        Compress-Archive -Path release_pkg/* -DestinationPath HD2_LOG_VIEWER_v.zip

    - name: Release
      uses: softprops/action-gh-release@v1
      with:
        files: HD2_LOG_VIEWER_v.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}