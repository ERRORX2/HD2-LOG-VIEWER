name: Build HD2 LOG VIEWER

on:
  push:
    tags:
      - 'v*' # Triggers only when you push a tag like v1.0, v1.1, etc.

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas matplotlib seaborn pyinstaller

    - name: Build EXE
      run: |
        python -m PyInstaller --noconsole --onefile --add-data "groups.json;." HD2_LOG_VIEWER.pyw

    - name: Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/HD2_LOG_VIEWER.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}