name: Build HD2 LOG VIEWER & Release

on:
  push:
    branches: ["master"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip

          if (Test-Path "requirements.txt") {
            pip install -r requirements.txt
          } else {
            pip install pandas matplotlib numpy pyinstaller
          }

      - name: Prepare Artifact Folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifact | Out-Null

      - name: Build Executable
        shell: pwsh
        run: |
          pyinstaller --clean `
            --onefile `
            --noconsole `
            --name "HD2_LOG_VIEWER" `
            --add-data "groups.json;." `
            HD2_LOG_VIEWER.pyw

          if (-not (Test-Path "dist\HD2_LOG_VIEWER.exe")) {
            throw "Build failed"
          }

          Copy-Item "dist\HD2_LOG_VIEWER.exe" "artifact\" -Force
          Copy-Item "groups.json" "artifact\" -Force

      - name: Create Release ZIP + SHA256
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}" -replace "refs/tags/", ""
          $zip = "release_$tag.zip"

          Compress-Archive `
            -Path "artifact\*" `
            -DestinationPath "artifact\$zip" `
            -Force

          $hash = Get-FileHash "artifact\$zip" -Algorithm SHA256
          $hash.Hash.ToUpper() | Set-Content "artifact\sha256.txt" -Encoding utf8

          Set-Content "artifact\zipname.txt" $zip -Encoding utf8

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: artifact/

      - name: Upload Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifact/release_*.zip


  virustotal:
    runs-on: windows-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: artifact/

      - name: VirusTotal Upload + Report Fetch
        shell: pwsh
        env:
          VT_API_KEY: ${{ secrets.VT_API_KEY }}
        run: |
          $ErrorActionPreference = "Stop"

          $exe = "artifact\HD2_LOG_VIEWER.exe"
          $zipHash = Get-Content "artifact\sha256.txt"

          # Upload file
          $upload = Invoke-RestMethod `
            -Uri "https://www.virustotal.com/api/v3/files" `
            -Headers @{ "x-apikey" = $env:VT_API_KEY } `
            -Method Post `
            -InFile $exe

          $analysisId = $upload.data.id

          if (-not $analysisId) {
            throw "VirusTotal upload failed"
          }

          # Poll for completion
          $i = 0
          $maxTries = 20

          do {
            Start-Sleep -Seconds 10
            $i++

            $report = Invoke-RestMethod `
              -Uri "https://www.virustotal.com/api/v3/analyses/$analysisId" `
              -Headers @{ "x-apikey" = $env:VT_API_KEY }

            $status = $report.data.attributes.status

          } while ($status -ne "completed" -and $i -lt $maxTries)

          $stats = $report.data.attributes.stats

          $reportUrl = "https://www.virustotal.com/gui/analysis/$analysisId"

          $vtResult = "OK | Malicious: $($stats.malicious) | Suspicious: $($stats.suspicious) | $reportUrl"

          $vtResult | Set-Content "artifact\vt_result.txt" -Encoding utf8

      - name: Update README
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}" -replace "refs/tags/", ""
          $hash = Get-Content "artifact\sha256.txt"
          $vt = Get-Content "artifact\vt_result.txt"
          $date = Get-Date -Format "yyyy-MM-dd"
          $zip = "release_$tag.zip"

          $start = "<!-- LATEST_RELEASE_START -->"
          $end = "<!-- LATEST_RELEASE_END -->"

          $block = @"
          $start
          ### 🚀 Latest Release: $tag ($date)

          - Download: [release_$zip](https://github.com/${{ github.repository }}/releases/download/$tag/$zip)
          - SHA256: $hash
          - VirusTotal: $vt
          $end
          "@

          $readme = Get-Content README.md -Raw -Encoding utf8

          if ($readme -match "(?s)$start.*?$end") {
            $readme = $readme -replace "(?s)$start.*?$end", $block
          } else {
            $readme = $readme + "`n" + $block
          }

          Set-Content README.md $readme -Encoding utf8

      - name: Commit README Safely
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add README.md
          git commit -m "docs: update release ${{ github.ref_name }} [skip ci]" || exit 0

          git pull --rebase origin master
          git push origin HEAD:master