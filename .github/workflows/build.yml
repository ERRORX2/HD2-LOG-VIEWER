name: Build HD2 LOG VIEWER

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout Code
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas matplotlib numpy pyinstaller

    - name: Build EXE
      run: |
        python -m PyInstaller --noconsole --onefile --collect-all matplotlib --name "HD2_LOG_VIEWER" HD2_LOG_VIEWER.pyw

    - name: Update README
      shell: pwsh
      run: |
        $tag = "${{ github.ref_name }}"
        if ("${{ github.ref_type }}" -ne "tag") { $tag = "Manual Build" }
        $date = Get-Date -Format "yyyy-MM-dd"
        $vt_search = "https://www.virustotal.com/gui/home/upload" 
        
        $content = Get-Content README.md -Raw
        
        $newInfo = "### 🚀 Latest Release: $tag ($date)`n"
        $newInfo += "- **Download:** [HD2_LOG_VIEWER_latest.zip](../../releases/latest)`n"
        $newInfo += "- **Security Scan:** [Verify on VirusTotal]($vt_search)`n"
        
        $pattern = "(?s).*?"
        $replacement = "`n$newInfo`n"
        
        $content = $content -replace $pattern, $replacement
        Set-Content README.md $content

    - name: Commit Updated README
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add README.md
        git commit -m "docs: update latest release info in README [skip ci]" || echo "No changes to commit"
        git push origin main

    - name: Prepare Release Package
      shell: pwsh
      run: |
        if (!(Test-Path "release_pkg")) { mkdir release_pkg }
        copy-item "dist/HD2_LOG_VIEWER.exe" -Destination "release_pkg/"
        copy-item "groups.json" -Destination "release_pkg/"
        Compress-Archive -Path release_pkg/* -DestinationPath "HD2_LOG_VIEWER_latest.zip"

    - name: Release
      id: create_release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'manual-build' }}
        files: HD2_LOG_VIEWER_latest.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: VirusTotal Scan
      if: env.VT_API_KEY != ''
      uses: cssnr/virustotal-action@v1
      with:
        vt_api_key: ${{ secrets.VT_API_KEY }}
        file_globs: HD2_LOG_VIEWER_latest.zip
        release_id: ${{ steps.create_release.outputs.id }}
        update_release: true
      env:
        VT_API_KEY: ${{ secrets.VT_API_KEY }}