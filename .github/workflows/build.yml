name: Build HD2 LOG VIEWER & Release

on:
  push:
    branches: ["master"]
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # Required for uploading release assets and committing updates

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install Dependencies
        run: |
          pip install pandas matplotlib numpy pyinstaller
      
      - name: Build Executable
        run: |
          pyinstaller --onefile --noconsole --name "HD2_LOG_VIEWER" HD2_LOG_VIEWER.pyw
      
      - name: Package Release Assets (ZIP)
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -like 'refs/tags/*') { $tag = $tag[11..] } # Extract version from tag like v1.2 -> 1.2
          else { $tag = (Get-Date -Format "yyyy-MM-dd").Replace('-', '') } # Fallback for push/dispatch
      
          Compress-Archive -Path "dist/HD2_LOG_VIEWER.exe", "groups.json" -DestinationPath "release_${tag}.zip" -Force
          
          # Upload to Release
          $content = Get-Content README.md -Raw
          if ($tag -like 'refs/tags/*') {
            $startTag = "<!-- LATEST_RELEASE_START -->"
            $endTag = "<<!-- LATEST_RELEASE_END -->" 
            $newBlock = "$startTag`n### 🚀 Latest Release: $tag ($(Get-Date -Format 'yyyy-MM-dd'))`n"
            $newBlock += "- **Download:** [release_${tag}.zip](../../releases/tag/${{ github.ref_name }})`n"
            $newBlock += "- **Security:** Scan complete in parallel job...`n`n$endTag"
            
            $content = $content -replace "(?s)$startTag.*?$endTag", $newBlock
            Set-Content README.md $content
          }

      - name: Upload Release Assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release_${{ github.ref_name }}.zip
          body: "HD2 LOG VIEWER release artifact."
          draft: false
          prerelease: false
      
      - name: Upload Artifact for VT Scan
        if: always() # Runs even if tag is missing, but needed only if VT needs to run
        uses: actions/upload-artifact@v4
        with:
          name: build-output-for-vt
          path: |
            dist/HD2_LOG_VIEWER.exe
            groups.json
      
      - name: Commit README update (if applicable)
        if: always() && startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          # Note: This step ensures documentation is updated.
          # Using GitHub token for push in workflow bot config is safer.
          $status = git status --porcelain
          if ($status) {
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "docs: update release info for ${{ github.ref_name }} [skip ci]"
          }

  virustotal:
    runs-on: windows-latest
    permissions:
      contents: read # Does not need write access
    
    needs: [build] # Runs SEQUENTIALLY after build completes successfully or fails
    
    if: startsWith(github.ref, 'refs/tags/') && github.event_name == 'push' || (startsWith(github.ref, 'refs/tags/') && github.event_name == 'workflow_dispatch')
    
    steps:
      - name: Download Build Output from Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output-for-vt
          path: dist/

      - name: VirusTotal Upload (with retries)
        shell: pwsh
        run: |
          $file = "dist/HD2_LOG_VIEWER.exe"
          $apiKey = "${{ secrets.VT_API_KEY }}"
          $maxRetries = 3
          $attempt = 0
          $success = $false

          while ($attempt -lt $maxRetries -and -not $success) {
            $attempt++
            Write-Host "VT attempt $attempt/$maxRetries..."
            
            try {
              # Use Invoke-RestMethod or curl equivalent logic if necessary, but PowerShell API is robust.
              # Using Invoke-WebRequest for simplicity in VT API calls.
              $response = Invoke-RestMethod -Uri "https://www.virustotal.com/api/v3/files" `
                -Headers @{ "x-apikey" = $apiKey } `
                -Method Post `
                -InFile $file
                
              # Extract ID for result storage
              if ($response.data.id) {
                Set-Content vt_result.txt $response.data.id
                Write-Host "VT Scan Success: $($response.data.id)"
                $success = $true
                break
              }
            }
            catch {
              Write-Warning "VT failed attempt $attempt: $_"
            }

            if ($attempt -lt $maxRetries) {
              Start-Sleep -Seconds (5 * $attempt)
            }
          }

          if (-not $success) {
            Set-Content vt_result.txt "SKIPPED_SCAN_FAILED"
          }

      - name: Upload VT Result as Artifact (for visibility)
        uses: actions/upload-artifact@v4
        with:
          name: virus-total-result
          path: vt_result.txt
