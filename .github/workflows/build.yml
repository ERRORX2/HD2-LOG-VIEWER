name: Build HD2 LOG VIEWERS

on:
  push:
    tags:
      - '*' 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas matplotlib numpy pyinstaller

    - name: Build EXE
      run: |
        python -m PyInstaller --noconsole --onefile --collect-all matplotlib --name "HD2_LOG_VIEWER" HD2_LOG_VIEWER.pyw

    - name: Update README
      shell: pwsh
      run: |
        $tag = "${{ github.ref_name }}"
        if ("${{ github.ref_type }}" -ne "tag") { $tag = "Manual Build" }
        $date = Get-Date -Format "yyyy-MM-dd"
        
        $content = Get-Content README.md -Raw
        
        $newInfo = "### 🚀 Latest Release: $tag ($date)`n"
        $newInfo += "- **Download:** [HD2_LOG_VIEWER_latest.zip](../../releases/latest)`n"
        $newInfo += "- **Security Scan:** [Verify on VirusTotal](https://www.virustotal.com/gui/home/upload)`n"
        
        # DEFINING THE TARGET TAGS
        $startTag = "<!-- LATEST_RELEASE_START -->"
        $endTag = "<!-- LATEST_RELEASE_END -->"
        
        # Safe Regex: find everything between the tags and replace it
        $pattern = "(?s)$startTag.*?$endTag"
        $replacement = "$startTag`n$newInfo`n$endTag"
        
        $content = $content -replace $pattern, $replacement
        Set-Content README.md $content

    - name: Commit Updated README
      shell: pwsh
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global core.autocrlf false
        
        git add README.md
        $status = git status --porcelain
        if ($status) {
            git commit -m "docs: update latest release info in README [skip ci]"
            # Added --force to resolve the "non-fast-forward" rejection
            git push origin HEAD:master --force
        }

    - name: Prepare Release Package
      shell: pwsh
      run: |
        if (!(Test-Path "release_pkg")) { mkdir release_pkg }
        copy-item "dist/HD2_LOG_VIEWER.exe" -Destination "release_pkg/"
        copy-item "groups.json" -Destination "release_pkg/" 
        Compress-Archive -Path release_pkg/* -DestinationPath "HD2_LOG_VIEWER_latest.zip"

    - name: Release
      id: create_release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        files: HD2_LOG_VIEWER_latest.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: VirusTotal Scan
      if: env.VT_API_KEY != ''
      uses: cssnr/virustotal-action@v1
      with:
        vt_api_key: ${{ secrets.VT_API_KEY }}
        file_globs: HD2_LOG_VIEWER_latest.zip
        update_release: false 
      env:
        VT_API_KEY: ${{ secrets.VT_API_KEY }}